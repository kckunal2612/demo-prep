description = "Pick specific features or fixes to include in your demo deck"
prompt = """
Run the demo-prep skill in pick mode.

1. Determine the start point (last demo-* tag → last version tag → 30 days ago), tell the user what you found.
2. Gather git history, merged PRs, and closed issues since that point.
3. Present a numbered list of everything shipped — group by features, fixes, infra — in plain English. For example:

   Features:
     1. Search now filters by date range
     2. Users can export reports as CSV
   Fixes:
     3. Login no longer fails on Safari
     4. Dashboard loads 2x faster
   Infra:
     5. Migrated CI to GitHub Actions

4. Ask: "Which ones do you want to demo? Enter numbers (e.g. 1, 3) or 'all'."
5. Also ask: "Who's the audience and how technical should the deck be? (high / medium / low)"
6. Generate the deck using only the selected items. Everything else is dropped — don't mention it.
"""
